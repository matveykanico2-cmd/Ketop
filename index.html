<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketop — ИИ-чат</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e6e6e6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .chat {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 12px;
            color: #9aa4b2;
        }

        /* Лента сообщений */
        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px 4px;
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            /* Эффект появления текста */
            animation: appear 0.4s ease forwards;
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg.ai {
            align-self: flex-start;
            background: #1c2130;
            border-bottom-left-radius: 4px;
        }

        .msg.thinking {
            opacity: 0.6;
            font-style: italic;
        }

        /* Поле ввода */
        .input-row {
            display: flex;
            gap: 8px;
            padding-top: 12px;
        }

        .text {
            flex: 1;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #2b3346;
            background: #161a24;
            color: #e6e6e6;
            font-size: 15px;
            outline: none;
        }

        .text:focus { border-color: #2563eb; }

        button {
            padding: 0 20px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }

        button:disabled { opacity: 0.5; cursor: default; }

        #mic { padding: 0 14px; background: #1c2130; font-size: 18px; }
    </style>
</head>
<body>
    <div class="chat">
        <h1>Ketop · самообучающийся бот</h1>
        <div class="messages" id="messages"></div>
        <div class="input-row">
            <button id="mic" title="Говорить">🎤</button>
            <input type="text" class="text" id="text" placeholder="Напиши или скажи..." autocomplete="off">
            <button id="send">Отправить</button>
        </div>
    </div>

    <!-- Настоящая нейросеть в браузере (WebLLM, без API, без ключей) -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // Умнее и лучше в коде, но тяжелее (~4-5 ГБ, нужна видеокарта посильнее).
        // Если не тянет — поставь "Llama-3.2-3B-Instruct-q4f16_1-MLC" (легче).
        const MODEL = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
        let engine = null;
        let loadPromise = null;

        window.KetopAI = {
            supported: !!navigator.gpu,   // нужен WebGPU
            model: MODEL,
            ensureLoaded(onProgress) {
                if (loadPromise) return loadPromise;
                loadPromise = webllm.CreateMLCEngine(MODEL, {
                    initProgressCallback: (r) => { if (onProgress) onProgress(r); },
                }).then((e) => { engine = e; return e; });
                return loadPromise;
            },
            async chat(messages, onProgress) {
                const e = await this.ensureLoaded(onProgress);
                const res = await e.chat.completions.create({ messages, temperature: 0.7 });
                return res.choices[0].message.content;
            },
        };
    </script>

    <script src="js/mamory-logic.js"></script>
</body>
</html>
